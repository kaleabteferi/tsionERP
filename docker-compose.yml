services:
  app:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-tsion_erp}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-local}
      COMPANY_NAME: ${COMPANY_NAME:-Tsion Parboiled Brown Rice}
      COMPANY_PHONE: ${COMPANY_PHONE:-+251 94 413 5444}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-Addis Ababa, Ethiopia}
      COMPANY_TIN: ${COMPANY_TIN:-}
      COMPANY_TAGLINE: ${COMPANY_TAGLINE:-100% Natural · Healthy · Gluten Free · Made in Ethiopia}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    volumes:
      - app_uploads:/app/backend/uploads
      - app_generated:/app/backend/generated_pdfs
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-tsion_erp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  app_uploads:
  app_generated:
